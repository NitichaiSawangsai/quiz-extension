<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Wappalyzer - Technology profiler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      width: 300px;
      background: #0f172a;
      color: #e2e8f0;
      padding: 18px;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 5px;
    }

    input[type="password"],
    input[type="text"],
    select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 13px;
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #6366f1; }

    .model-note {
      font-size: 11px;
      color: #64748b;
      margin-top: -10px;
      margin-bottom: 14px;
    }

    button {
      width: 100%;
      padding: 9px;
      border-radius: 6px;
      border: none;
      background: #6366f1;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4f46e5; }
    button.secondary {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      margin-top: 6px;
    }
    button.secondary:hover { background: #334155; }
    button.danger {
      background: transparent;
      border: 1px solid #ef4444;
      color: #ef4444;
      margin-top: 6px;
    }
    button.danger:hover { background: #ef444422; }

    /* สถานะ Key บันทึกแล้ว */
    #saved-state {
      display: none;
      background: #0d2818;
      border: 1px solid #166534;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
    }
    #saved-state .saved-label {
      font-size: 11px;
      color: #4ade80;
      font-weight: 600;
      margin-bottom: 4px;
    }
    #saved-state .saved-preview {
      font-size: 12px;
      color: #86efac;
      font-family: monospace;
      letter-spacing: 0.05em;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }
    .ok { color: #10b981; }
    .err { color: #ef4444; }

    .divider {
      border: none;
      border-top: 1px solid #1e293b;
      margin: 14px 0;
    }

    .hint {
      font-size: 11px;
      color: #475569;
      line-height: 1.6;
    }
    .hint strong { color: #64748b; }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .toggle-row:hover { border-color: #4f46e5; }
    .toggle-label {
      font-size: 13px;
      color: #e2e8f0;
      font-weight: 500;
      user-select: none;
    }
    .toggle-label small {
      display: block;
      font-size: 11px;
      color: #64748b;
      font-weight: 400;
      margin-top: 2px;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #334155;
      border-radius: 22px;
      transition: 0.3s;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: #94a3b8;
      border-radius: 50%;
      transition: 0.3s;
    }
    .switch input:checked + .slider { background-color: #6366f1; }
    .switch input:checked + .slider:before {
      transform: translateX(16px);
      background-color: white;
    }
    .search-badge {
      display: none;
      font-size: 10px;
      background: #312e81;
      color: #a5b4fc;
      border: 1px solid #4338ca;
      border-radius: 4px;
      padding: 2px 6px;
      margin-bottom: 14px;
    }
    .search-badge.visible { display: block; }

    /* Enable/Disable badge */
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      flex-shrink: 0;
    }
    .status-dot.on  { background: #10b981; box-shadow: 0 0 6px #10b981; }
    .status-dot.off { background: #475569; }
  </style>
</head>
<body>

  <label class="toggle-row" for="webSearch">

      <input type="checkbox" id="webSearch" />

  <button id="save">บันทึก</button>
